name: Build and Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "Docs/**"
      - "docs/**"
      - "scripts/build_docs.py"
      - "docs/requirements.txt"
      - ".github/workflows/jekyll-gh-pages.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Docs/**"
      - "docs/**"
      - "scripts/build_docs.py"
      - "docs/requirements.txt"
      - ".github/workflows/jekyll-gh-pages.yml"
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch/tag/SHA to build (optional)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CHECKOUT_REF: ${{ github.event.inputs.target_ref || github.ref }}
    steps:
      - name: Show resolved refs
        run: |
          echo "github.ref=${{ github.ref }}"
          echo "github.ref_name=${{ github.ref_name }}"
          echo "target_ref_input=${{ github.event.inputs.target_ref }}"
          echo "checkout_ref=${{ env.CHECKOUT_REF }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
            pip install -r docs/requirements.txt

      - name: Generate documentation site
        run: python scripts/build_docs.py

      - name: Resolve docs directory
        run: |
          if [ -d "Docs" ]; then
            echo "DOCS_DIR=Docs" >> "$GITHUB_ENV"
          elif [ -d "docs" ]; then
            echo "DOCS_DIR=docs" >> "$GITHUB_ENV"
          else
            echo "Docs directory not found."
            exit 1
          fi

      - name: Add .nojekyll
        run: touch "${{ env.DOCS_DIR }}/.nojekyll"

      - name: Verify generated HTML
        run: test -f "${{ env.DOCS_DIR }}/index.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "${{ env.DOCS_DIR }}"

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
